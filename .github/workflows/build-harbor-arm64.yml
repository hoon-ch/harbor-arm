name: Check and Build Harbor ARM64

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Harbor version to build (e.g., v2.15.1)'
        required: false
        type: string
        default: ''
      force_rebuild:
        description: 'Rebuild even if built_versions.txt already contains the version'
        required: false
        type: boolean
        default: false
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'

permissions:
  contents: read
  packages: write

concurrency:
  group: harbor-arm64-publish
  cancel-in-progress: false

env:
  HARBOR_REPO: goharbor/harbor
  HARBOR_IMAGE_REPO: goharbor/harbor-core

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck $(git ls-files '*.sh')

  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_retag_latest: ${{ steps.check.outputs.should_retag_latest }}
      version: ${{ steps.check.outputs.version }}
      should_tag_latest: ${{ steps.check.outputs.should_tag_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check for new release
        id: check
        run: |
          get_latest_harbor_image_version() {
            local url="https://registry.hub.docker.com/v2/repositories/${{ env.HARBOR_IMAGE_REPO }}/tags?page_size=100"

            while [ -n "${url}" ] && [ "${url}" != "null" ]; do
              response=$(curl -fsSL "${url}")
              jq -r '.results[].name | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))' <<< "${response}"
              url=$(jq -r '.next // empty' <<< "${response}")
            done | sort -V | tail -n 1
          }

          get_arm64_manifest_digest() {
            jq -r '
              if type == "array" then
                map(select(.Descriptor.platform.architecture == "arm64" and .Descriptor.platform.os == "linux"))[0].Descriptor.digest // empty
              else
                .Descriptor.digest // empty
              end
            ' "$1"
          }

          HARBOR_IMAGE_VERSION=$(get_latest_harbor_image_version)

          if ! grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$' <<< "${HARBOR_IMAGE_VERSION}"; then
            echo "::error::Unable to determine the latest stable Harbor image tag from ${{ env.HARBOR_IMAGE_REPO }}"
            echo "Resolved image tag: ${HARBOR_IMAGE_VERSION:-<empty>}"
            exit 1
          fi

          echo "Latest stable Harbor image tag: ${HARBOR_IMAGE_VERSION}"

          # Get the Harbor version to build.
          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_VERSION="${{ github.event.inputs.version }}"
            echo "Using manually specified version: $LATEST_VERSION"
          else
            LATEST_VERSION="${HARBOR_IMAGE_VERSION}"
          fi

          if ! grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$' <<< "${LATEST_VERSION}"; then
            echo "::error::Invalid Harbor version: ${LATEST_VERSION:-<empty>}"
            exit 1
          fi

          if [ "${LATEST_VERSION}" = "${HARBOR_IMAGE_VERSION}" ]; then
            SHOULD_TAG_LATEST=true
          else
            echo "Manual build is not the latest stable Harbor image tag; :latest will not be updated"
            SHOULD_TAG_LATEST=false
          fi

          echo "should_tag_latest=${SHOULD_TAG_LATEST}" >> $GITHUB_OUTPUT

          latest_tag_current=false
          if [ "${SHOULD_TAG_LATEST}" = "true" ]; then
            VERSION_TAG="${LATEST_VERSION#v}"
            VERSION_IMAGE="ghcr.io/${{ github.repository_owner }}/harbor-core-arm64:${VERSION_TAG}"
            LATEST_IMAGE="ghcr.io/${{ github.repository_owner }}/harbor-core-arm64:latest"

            if docker manifest inspect --verbose "${VERSION_IMAGE}" > version-manifest.json 2>/dev/null; then
              version_digest=$(get_arm64_manifest_digest version-manifest.json)
              latest_digest=""

              if docker manifest inspect --verbose "${LATEST_IMAGE}" > latest-manifest.json 2>/dev/null; then
                latest_digest=$(get_arm64_manifest_digest latest-manifest.json)
              fi

              if [ -n "${version_digest}" ] && [ "${version_digest}" = "${latest_digest}" ]; then
                latest_tag_current=true
              fi
            fi
          fi

          echo "latest_tag_current=${latest_tag_current}"

          FORCE_REBUILD="${{ github.event.inputs.force_rebuild || false }}"
          echo "force_rebuild=${FORCE_REBUILD}"

          # Check if we already built this version
          if [ -f "built_versions.txt" ]; then
            if [ "${FORCE_REBUILD}" != "true" ] && grep -q "^${LATEST_VERSION}$" built_versions.txt; then
              echo "Version $LATEST_VERSION already built"
              echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
              if [ "${SHOULD_TAG_LATEST}" = "true" ] && [ "${latest_tag_current}" != "true" ]; then
                echo "Latest tag does not point at ${LATEST_VERSION}; retagging existing images"
                echo "should_retag_latest=true" >> $GITHUB_OUTPUT
              else
                echo "should_retag_latest=false" >> $GITHUB_OUTPUT
              fi
              echo "should_build=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "New version detected: $LATEST_VERSION"
          echo "should_retag_latest=false" >> $GITHUB_OUTPUT
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT

  build-harbor:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm  # Use native ARM64 runner!
    steps:
      - name: Checkout harbor-arm repository
        uses: actions/checkout@v6

      - name: Checkout Harbor repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.HARBOR_REPO }}
          ref: ${{ needs.check-release.outputs.version }}
          path: harbor

      - name: Detect Harbor Go version
        id: detect-go-version
        working-directory: harbor
        run: |
          GO_VERSION=$(sed -nE 's/^go[[:space:]]+([0-9]+(\.[0-9]+){1,2}).*/\1/p' src/go.mod | head -n 1)

          if [ -z "${GO_VERSION}" ]; then
            echo "::error::Unable to detect required Go version from harbor/src/go.mod"
            exit 1
          fi

          echo "Detected Harbor Go version: ${GO_VERSION}"
          echo "go_version=${GO_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.detect-go-version.outputs.go_version }}
          cache: true
          cache-dependency-path: harbor/src/go.sum

      - name: Verify installed Go version
        run: |
          REQUIRED_GO_VERSION="${{ steps.detect-go-version.outputs.go_version }}"
          INSTALLED_GO_VERSION=$(go env GOVERSION | sed 's/^go//')

          echo "Required Harbor Go version: ${REQUIRED_GO_VERSION}"
          echo "Installed Go toolchain: ${INSTALLED_GO_VERSION}"

          if [ "$(printf '%s\n%s\n' "${INSTALLED_GO_VERSION}" "${REQUIRED_GO_VERSION}" | sort -V | head -n 1)" != "${REQUIRED_GO_VERSION}" ]; then
            echo "::error::Installed Go toolchain ${INSTALLED_GO_VERSION} does not satisfy Harbor requirement ${REQUIRED_GO_VERSION}"
            exit 1
          fi

      # Cache Go modules for faster builds
      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ steps.detect-go-version.outputs.go_version }}-${{ hashFiles('harbor/src/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.detect-go-version.outputs.go_version }}-

      # No QEMU needed - we're running on native ARM64!

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Cache Docker layers for faster builds
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ needs.check-release.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base images for ARM64
        working-directory: harbor
        run: |
          ../scripts/build/build-base-images.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Build registry binary for ARM64
        working-directory: harbor
        run: |
          ../scripts/build/build-registry-binary.sh

      - name: Patch Harbor build files
        working-directory: harbor
        run: |
          ../scripts/build/patch-harbor-build.sh \
            "${{ needs.check-release.outputs.version }}"

      - name: Build Harbor components for ARM64
        working-directory: harbor
        run: |
          ../scripts/build/build-harbor-components.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Tag and push ARM64 images
        working-directory: harbor
        run: |
          ../scripts/build/tag-and-push-images.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            "${{ github.repository_owner }}" \
            "${{ needs.check-release.outputs.should_tag_latest }}"

  retag-latest:
    needs: check-release
    if: needs.check-release.outputs.should_retag_latest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag latest images
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          GHCR_OWNER="${{ github.repository_owner }}"
          source ./scripts/config.sh

          for component in "${HARBOR_COMPONENTS[@]}"; do
            docker buildx imagetools create \
              -t "${DOCKER_USERNAME}/harbor-${component}-arm64:latest" \
              "${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"

            docker buildx imagetools create \
              -t "ghcr.io/${GHCR_OWNER}/harbor-${component}-arm64:latest" \
              "ghcr.io/${GHCR_OWNER}/harbor-${component}-arm64:${VERSION_TAG}"
          done

  sign-images:
    needs: [check-release, build-harbor]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      id-token: write
    # Non-blocking until a manual run confirms keyless signing works for both registries.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign published images
        env:
          COSIGN_YES: "true"
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          GHCR_OWNER="${{ github.repository_owner }}"
          source ./scripts/config.sh

          sign_image_by_digest() {
            local image=$1
            local digest

            digest=$(docker buildx imagetools inspect "$image" --format '{{.Manifest.Digest}}')
            if [ -z "$digest" ] || [ "$digest" = "<no value>" ]; then
              echo "::error::Unable to resolve digest for ${image}"
              return 1
            fi

            cosign sign "${image%:*}@${digest}"
          }

          for component in "${HARBOR_COMPONENTS[@]}"; do
            sign_image_by_digest "${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            sign_image_by_digest "ghcr.io/${GHCR_OWNER}/harbor-${component}-arm64:${VERSION_TAG}"
          done

  validate-images:
    needs: [check-release, build-harbor]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm  # Use native ARM64 runner for testing
    # This job can run in parallel with integration-test and api-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull built images
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          # Pull all built images for validation
          source ./scripts/config.sh

          for component in "${HARBOR_COMPONENTS[@]}"; do
            IMAGE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            echo "Pulling ${IMAGE}..."
            docker pull ${IMAGE} || echo "Warning: Failed to pull ${component}"
          done

      - name: Install jq for validation reports
        run: |
          sudo apt-get update && sudo apt-get install -y jq || echo "Warning: jq install failed; validation will skip security scan if jq is unavailable"

      - name: Install Trivy for security scanning
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin || echo "Warning: Trivy install failed; validation will skip security scan if Trivy is unavailable"

      - name: Run validation tests
        run: |
          # Retag images to expected format for validation script
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          source ./scripts/config.sh

          # Retag images from -arm64 suffix to standard names for validation
          for component in "${HARBOR_COMPONENTS[@]}"; do
            SOURCE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            TARGET="${DOCKER_USERNAME}/${HARBOR_IMAGE_NAMES[$component]}:${VERSION_TAG}"

            if docker image inspect ${SOURCE} >/dev/null 2>&1; then
              docker tag ${SOURCE} ${TARGET}
              echo "Tagged ${SOURCE} as ${TARGET}"
            fi
          done

          # Run validation script
          ./scripts/test/validate-images.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            --full

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-report
          path: harbor-validation-report-*.md
          retention-days: 30

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-reports
          path: trivy-reports-*/
          retention-days: 30

      - name: Add validation results to summary
        if: always()
        run: |
          if [ -f harbor-validation-report-*.md ]; then
            cat harbor-validation-report-*.md >> $GITHUB_STEP_SUMMARY
          fi

  integration-test:
    needs: [check-release, build-harbor]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    # This job can run in parallel with validate-images and api-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and retag images for integration testing
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          # Pull all built images
          source ./scripts/config.sh

          for component in "${HARBOR_COMPONENTS[@]}"; do
            IMAGE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            echo "Pulling ${IMAGE}..."
            docker pull ${IMAGE} || echo "Warning: Failed to pull ${component}"
          done

          # Retag images to expected format for docker-compose.test.yml
          for component in "${HARBOR_COMPONENTS[@]}"; do
            SOURCE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            TARGET="${DOCKER_USERNAME}/${HARBOR_IMAGE_NAMES[$component]}:${VERSION_TAG}"

            if docker image inspect ${SOURCE} >/dev/null 2>&1; then
              docker tag ${SOURCE} ${TARGET}
              echo "Tagged ${SOURCE} as ${TARGET}"
            fi
          done

      - name: Run integration tests
        run: |
          ./scripts/test/integration-test-simple.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}"

      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-report
          path: harbor-integration-test-report-*.md
          retention-days: 30

      - name: Add integration results to summary
        if: always()
        run: |
          if [ -f harbor-integration-test-report-*.md ]; then
            cat harbor-integration-test-report-*.md >> $GITHUB_STEP_SUMMARY
          fi

  api-test:
    needs: [check-release, build-harbor]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    # This job can run in parallel with validate-images and integration-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and retag images for API testing
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          # Pull all built images
          source ./scripts/config.sh

          for component in "${HARBOR_COMPONENTS[@]}"; do
            IMAGE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            docker pull ${IMAGE} || echo "Warning: Failed to pull ${component}"
          done

          # Retag images to expected format for docker-compose.test.yml
          for component in "${HARBOR_COMPONENTS[@]}"; do
            SOURCE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            TARGET="${DOCKER_USERNAME}/${HARBOR_IMAGE_NAMES[$component]}:${VERSION_TAG}"

            if docker image inspect ${SOURCE} >/dev/null 2>&1; then
              docker tag ${SOURCE} ${TARGET}
            fi
          done

      - name: Run API tests (Simplified)
        run: |
          ./scripts/test/api-test-simple.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            "http://localhost:8080"

      - name: Upload API test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-test-report
          path: harbor-api-test-report-*.md
          retention-days: 30

      - name: Add API test results to summary
        if: always()
        run: |
          if [ -f harbor-api-test-report-*.md ]; then
            cat harbor-api-test-report-*.md >> $GITHUB_STEP_SUMMARY
          fi

  benchmark:
    needs: [check-release, build-harbor]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    # This job can run in parallel with validate-images, integration-test, and api-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and retag images for benchmarking
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          VERSION_TAG="${VERSION#v}"
          DOCKER_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          # Pull all built images
          source ./scripts/config.sh

          for component in "${HARBOR_COMPONENTS[@]}"; do
            IMAGE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            docker pull ${IMAGE} || echo "Warning: Failed to pull ${component}"
          done

          # Retag images to expected format for docker-compose.test.yml
          for component in "${HARBOR_COMPONENTS[@]}"; do
            SOURCE="${DOCKER_USERNAME}/harbor-${component}-arm64:${VERSION_TAG}"
            TARGET="${DOCKER_USERNAME}/${HARBOR_IMAGE_NAMES[$component]}:${VERSION_TAG}"

            if docker image inspect ${SOURCE} >/dev/null 2>&1; then
              docker tag ${SOURCE} ${TARGET}
            fi
          done

      - name: Run benchmarks (Simplified)
        run: |
          ./scripts/test/benchmark-simple.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            "http://localhost:8080"

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: harbor-benchmark-report-*.md
          retention-days: 30

      - name: Add benchmark results to summary
        if: always()
        run: |
          if [ -f harbor-benchmark-report-*.md ]; then
            cat harbor-benchmark-report-*.md >> $GITHUB_STEP_SUMMARY
          fi

  e2e-smoke-test:
    needs: [check-release, build-harbor]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Harbor E2E smoke test
        run: |
          ./scripts/test/e2e-harbor-smoke.sh \
            "${{ needs.check-release.outputs.version }}" \
            "${{ secrets.DOCKERHUB_USERNAME }}"

  update-version-file:
    needs: [check-release, build-harbor, validate-images, integration-test, api-test, benchmark]
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # This job waits for all parallel test jobs to complete
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Commit version file
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          for attempt in 1 2 3; do
            git fetch origin main
            git checkout -B main origin/main

            if grep -qxF "$VERSION" built_versions.txt; then
              echo "Version $VERSION already recorded"
              exit 0
            fi

            echo "$VERSION" >> built_versions.txt
            sort -u built_versions.txt -o built_versions.txt

            git add built_versions.txt
            if git diff --staged --quiet; then
              echo "No version file changes to commit"
              exit 0
            fi

            git commit -m "Add built version $VERSION"

            if git push origin HEAD:main; then
              exit 0
            fi

            git reset --hard origin/main
            sleep $((attempt * 2))
          done

          echo "::error::Failed to push built_versions.txt after retries"
          exit 1
